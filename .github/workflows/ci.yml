# CI gates: the Rust analogue of the style-guide conformance the Python port enforced with ruff.
# rustfmt clean, clippy clean with upper_case_acronyms denied, and the full test suite green.
name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings, acronyms as one word)
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::upper_case_acronyms
      - name: Test
        run: cargo test --all
      # The playground is a standalone crate excluded from the workspace, so verify it separately
      # to keep it from rotting.
      - name: Playground (standalone) format
        run: cargo fmt --manifest-path ftrio-playground/Cargo.toml --check
      - name: Playground (standalone) clippy
        run: cargo clippy --manifest-path ftrio-playground/Cargo.toml --all-targets -- -D warnings -D clippy::upper_case_acronyms

  # Verify the declared MSRV is real: build on exactly the toolchain the manifests claim, with every
  # feature enabled (http/azure pull the heaviest deps). If a dependency bump raises the floor, this
  # job fails and the rust-version must be bumped to match, so the claim can never silently rot.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.86.0
      - name: Build workspace on MSRV (all features)
        run: cargo build --workspace --all-features
      - name: Build standalone playground on MSRV
        run: cargo build --manifest-path ftrio-playground/Cargo.toml
